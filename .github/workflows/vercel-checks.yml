name: Vercel Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Notify Vercel
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - hr-w: hr
          state: ${{ job.status }}
          token: ${{ secrets.GITHUB_TOKEN }}
